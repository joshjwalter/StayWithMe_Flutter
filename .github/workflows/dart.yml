# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Dart

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Replace dart-lang/setup-dart with subosito/flutter-action
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # Uncomment this step to verify the use of 'dart format' on each commit.
      # - name: Verify formatting
      #   run: dart format --output=none --set-exit-if-changed .

      # Consider passing '--fatal-infos' for slightly stricter analysis.
      - name: Analyze project source
        run: flutter analyze

      # Your project will need to have tests in test/ and a dependency on
      # package:test for this step to succeed. Note that Flutter projects will
      # want to change this to 'flutter test'.
      - name: Run tests
        run: flutter test

      - name: Run web integration smoke test
        run: |
          set -euo pipefail
          python3 scripts/request_capture_server.py --host 127.0.0.1 --port 54010 > request-server.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill "$SERVER_PID" || true
          }
          trap cleanup EXIT

          python3 -c "import time,urllib.request,sys; ok=False
for _ in range(30):
  try:
    r=urllib.request.urlopen('http://127.0.0.1:54010/health', timeout=1)
    ok=(getattr(r,'status',None)==200)
    r.close()
    if ok: break
  except Exception:
    time.sleep(1)
if not ok: sys.exit('server did not become healthy in time')"

          flutter test --platform chrome test/web_alarm_request_smoke_test.dart \
            --dart-define=API_BASE_URL=http://127.0.0.1:54010
